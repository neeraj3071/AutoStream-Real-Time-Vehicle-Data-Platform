global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'vehicle-simulator'
    static_configs:
      - targets: ['simulator:8000']

  - job_name: 'stream-processor'
    static_configs:
      - targets: ['processor:8001']

  - job_name: 'api-service'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9101']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
